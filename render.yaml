services:
  - type: web
    name: carpet-crm
    runtime: python
    plan: starter
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: carpetcrm-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1